<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,255,212,0.15);
  padding:12px 0;
}

nav{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
  max-width:600px;
  margin:auto;
}

nav a{
  color:#00f5d4;
  text-decoration:none;
  font-size:14px;
  position:relative;
}

/* HERO */
.hero{
  padding:10px;
  max-width:1200px;
  margin:auto;
}

.hero img{
  width:100%;
  border-radius:12px;
}

/* SECTION */
.section{
  margin:40px auto;
  padding:0 15px;
  max-width:1200px;
}

/* TITLE */
.section-title{
  font-family:'Permanent Marker', cursive;
  font-size:clamp(20px,3vw,28px);
  text-align:center;
  color:#b84cff;
  margin-bottom:20px;
}

/* ===== DESKTOP DEFAULT ===== */

/* GRID LAYOUT (NO SCROLL) */
.brands,
.deals,
.experience{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:16px;
}

/* ITEMS */
.brands img{
  height:90px;
}

.deals img{
  width:260px;
  height:260px;
  object-fit:contain;
}

.experience img{
  width:260px;
  height:200px;
  object-fit:cover;
}

/* VISIT DESKTOP */
.visit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* MAP */
iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:12px;
  filter:brightness(0.6);
}

/* VISIT IMAGE */
.visit img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

/* CLICK CARD */
.visit-card{
  display:block;
  border-radius:12px;
  overflow:hidden;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  background:rgba(0,0,0,0.85);
  padding:30px;
  border-radius:12px;
  text-align:center;
  border:1px solid rgba(184,76,255,0.4);
  box-shadow:0 0 25px rgba(184,76,255,0.3);
}

/* SMOKE */
.smoke{
  position:fixed;
  inset:0;
  background:url('https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166332/vape-store-background_jwo2nr.png') center/cover;
  opacity:0;
  pointer-events:none;
  z-index:0;
}

.fade-in{animation:smokeIn 1.5s forwards;}
.fade-out{animation:smokeOut 2s forwards;}

@keyframes smokeIn{
  from{opacity:0;}
  to{opacity:.6;}
}
@keyframes smokeOut{
  from{opacity:.6;}
  to{opacity:0;}
}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){

  /* HERO */
  .hero img{
    max-height:55vh;
    object-fit:contain;
  }

  /* SCROLL ROWS */
  .brands,
  .deals,
  .experience{
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:12px;
    scroll-snap-type:x proximity;
    touch-action:pan-y;
  }

  .brands img,
  .deals img,
  .experience img{
    scroll-snap-align:center;
  }

  .brands img{ height:70px; }

  .deals img{
    flex:0 0 80%;
    height:auto;
  }

  .experience img{
    flex:0 0 80%;
  }

  /* STACK VISIT */
  .visit{
    grid-template-columns:1fr;
  }

  iframe,
  .visit img{
    height:160px;
  }

}
</style>
</head>

<body>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>21+ Only</h2>
    <p>Are you 21 years or older?</p>
    <button onclick="enter()">Enter</button>
    <button onclick="exitSite()">No</button>
  </div>
</div>

<div class="smoke" id="smoke"></div>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<section class="hero">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<section class="section">
<div class="section-title">Brands We Carry</div>
<div class="brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
</div>
</section>

<section class="section">
<div class="deals">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
</div>
</section>

<section class="section">
<div class="experience">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777238327/the-elite-experience_nz4xtu.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
</div>
</section>

<section class="section">
<div class="visit">

<a href="#">
  <iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
</a>

<a href="#">
  <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
</a>

</div>
</section>

<script>
function enter(){
  document.getElementById("popup").style.display="none";
  const smoke = document.getElementById("smoke");
  smoke.classList.add("fade-in");
  setTimeout(()=>{
    smoke.classList.remove("fade-in");
    smoke.classList.add("fade-out");
  },1200);
}

function exitSite(){
  window.location.href="https://google.com";
}
</script>

</body>
</html>
