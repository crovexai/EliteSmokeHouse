<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House Smoke Shop</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
}

.container {
  width:92%;
  margin:auto;
}

/* NAV (MOBILE FIRST) */
header {
  text-align:center;
  padding:20px 0;
}

nav {
  margin-top:10px;
}

nav a {
  margin:0 10px;
  font-size:14px;
  color:#fff;
  text-decoration:none;
}

/* HERO (NO CROP EVER) */
.hero img {
  width:100%;
  height:auto;
  border-radius:12px;
}

/* SECTIONS */
.section {
  margin:40px 0;
}

h2 {
  margin-bottom:15px;
  font-size:22px;
}

/* BRANDS */
.brands {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  align-items:center;
}

.brands img {
  width:100%;
  max-height:50px;
  object-fit:contain;
}

/* DEALS (NATIVE MOBILE SCROLL) */
.deals {
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding-bottom:10px;
}

.deals::-webkit-scrollbar { display:none; }

.deals img {
  flex:0 0 85%;
  max-width:320px;
  border-radius:12px;
  scroll-snap-align:center;
}

/* EXPERIENCE */
.experience {
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card img {
  width:100%;
  height:auto;
  border-radius:12px;
}

/* VISIT */
.visit {
  display:flex;
  flex-direction:column;
  gap:15px;
}

.visit img,
iframe {
  width:100%;
  border-radius:12px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px 0;
  font-size:14px;
  opacity:0.6;
}

/* AGE POPUP */
.popup {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup button {
  margin-top:20px;
  padding:10px 25px;
  border:none;
  background:#00e0ff;
  color:#000;
  border-radius:6px;
}

/* ===== DESKTOP ENHANCEMENT ===== */
@media(min-width:900px){

  .container {
    max-width:1200px;
  }

  header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-align:left;
  }

  /* BRANDS */
  .brands {
    grid-template-columns:repeat(5,1fr);
  }

  /* DEALS GRID */
  .deals {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    overflow:hidden;
  }

  .deals img {
    max-width:100%;
  }

  /* EXPERIENCE 4 IN ROW */
  .experience {
    display:grid;
    grid-template-columns:repeat(4,1fr);
  }

  .card img {
    height:250px;
    object-fit:cover;
  }

  /* VISIT */
  .visit {
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
  }

}
</style>
</head>

<body>

<!-- AGE POPUP -->
<div class="popup" id="popup">
  <div style="text-align:center;">
    <h2>Are you 18+?</h2>
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="container">

<header>
  <h1>Elite House</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<!-- BRANDS -->
<section class="section">
  <h2>Brands We Carry</h2>
  <div class="brands">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
  </div>
</section>

<!-- DEALS -->
<section class="section">
  <h2>Deals This Week</h2>
  <div class="deals">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
  </div>
</section>

<!-- EXPERIENCE -->
<section class="section">
  <h2>The Elite Experience</h2>

  <div class="experience">

    <div class="card">
      <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
    </div>

    <div class="card">
      <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
    </div>

    <div class="card">
      <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
    </div>

    <div class="card">
      <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
    </div>

  </div>
</section>

<!-- VISIT -->
<section class="section">
  <h2>Visit Us</h2>
  <div class="visit">

    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166306/visit-us_ihw6sf.png">

    <iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>

    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">

  </div>
</section>

<footer>
  © 2026 Elite House Smoke Shop
</footer>

</div>

<script>
function enter(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
