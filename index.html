<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
}

/* NAV */
header{
  padding:12px;
}

nav{
  display:flex;
  justify-content:space-around;
}

nav a{
  color:#00f5d4;
  text-decoration:none;
  font-size:13px;
}

/* HERO */
.hero{
  padding:10px;
}
.hero img{
  width:100%;
  border-radius:12px;
}

/* SECTION */
.section{
  margin:30px 12px;
}

/* TITLE */
.section-title{
  font-family:'Permanent Marker';
  font-size:26px;
  text-align:center;
  color:#b84cff;
  margin-bottom:15px;
}

/* SCROLL ROW */
.scroll{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}

.scroll::-webkit-scrollbar{
  display:none;
}

/* ITEMS */
.scroll img{
  flex:0 0 75%;
  max-width:260px;
  border-radius:12px;
}

/* BRAND SPECIAL */
.brands img{
  flex:0 0 auto;
  height:60px;
}

/* VISIT */
.visit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

iframe{
  width:100%;
  height:160px;
  border:none;
  border-radius:12px;
  filter:brightness(0.5);
}

.visit img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:999;
}

.popup-box{
  background:#111;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

.popup-box h2{
  color:#00f5d4;
  font-family:'Permanent Marker';
}

.popup-buttons{
  margin-top:15px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

.enter-btn{
  background:#00f5d4;
  color:#000;
}

.exit-btn{
  background:#333;
  color:#fff;
}
</style>
</head>

<body>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>Elite House</h2>
    <p>21+ Only</p>

    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Enter</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<header>
<nav>
<a href="#">Home</a>
<a href="#">Brands</a>
<a href="#">Deals</a>
<a href="#">Experience</a>
<a href="#">Location</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<!-- BRANDS -->
<section class="section">
<div class="section-title">Brands We Carry</div>
<div class="scroll brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
</div>
</section>

<!-- DEALS -->
<section class="section">
<div class="section-title">🔥 Deals</div>
<div class="scroll">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</div>
</section>

<!-- EXPERIENCE -->
<section class="section">
<div class="section-title">✨ Experience</div>
<div class="scroll">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</div>
</section>

<!-- VISIT -->
<section class="section">
<div class="visit">

<a href="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan">
<iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
</a>

<a href="https://www.google.com/maps/dir/?api=1&destination=Elite+House+Smoke+Shop+San+Juan">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
</a>

</div>
</section>

<script>
function enter(){
  document.getElementById("popup").style.display="none";
}
function exitSite(){
  window.location.href="https://google.com";
}
</script>

</body>
</html>
