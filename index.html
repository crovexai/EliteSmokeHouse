<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House Smoke Shop</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background: url('https://res.cloudinary.com/dovrzmlqj/image/upload/f_auto,q_auto/v1777166332/vape-store-background_jwo2nr.png') center/cover fixed;
  color:#fff;
}

.overlay {
  background: rgba(0,0,0,0.75);
  min-height:100vh;
}

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

nav a {
  margin-left:20px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

nav a:hover { color:#00ffe0; }

.hero {
  height:85vh;
  min-height:600px;
  max-height:900px;
  background: url('https://res.cloudinary.com/dovrzmlqj/image/upload/f_auto,q_auto/v1777166401/smoke-shop-hero_agqdzt.png') center/cover no-repeat;
  margin:0 40px 60px;
  border-radius:12px;
  overflow:hidden;
}

.section {
  padding:0 40px;
  margin-bottom:60px;
}

h2 {
  margin-bottom:20px;
}

.brands {
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}

.brands img {
  height:55px;
}

.deals {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.deals img,
.experience img,
.visit img {
  width:100%;
  border-radius:12px;
}

.experience {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.experience img {
  height:100%;
  object-fit:cover;
}

.visit {
  display:grid;
  grid-template-columns:1fr 1.5fr 1fr;
  gap:20px;
  align-items:center;
}

iframe {
  width:100%;
  height:350px;
  border:none;
  border-radius:12px;
}

footer {
  text-align:center;
  padding:20px;
  opacity:0.6;
}

/* AGE GATE */
#ageGate {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.96);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.age-box {
  width:90%;
  max-width:420px;
  text-align:center;
  background:#111;
  padding:40px;
  border-radius:16px;
  border:1px solid #00ffe0;
  box-shadow:0 0 30px rgba(0,255,224,0.35);
}

.age-box h2 {
  font-size:36px;
  margin-bottom:15px;
}

.age-box p {
  margin-bottom:25px;
  line-height:1.5;
}

.age-buttons {
  display:flex;
  gap:15px;
  justify-content:center;
}

.age-buttons button {
  padding:12px 25px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.age-buttons button:first-child {
  background:#00ffe0;
  color:#000;
}

.age-buttons button:last-child {
  background:#ff0055;
  color:#fff;
}

@media (max-width:900px) {
  header {
    flex-direction:column;
    gap:15px;
  }

  nav {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
  }

  nav a {
    margin-left:0;
  }

  .hero {
    height:70vh;
    min-height:420px;
    margin:0 20px 40px;
  }

  .section {
    padding:0 20px;
  }

  .deals,
  .experience,
  .visit {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div id="ageGate">
  <div class="age-box">
    <h2>21+ Only</h2>
    <p>You must be 21 years or older to enter this site.</p>
    <div class="age-buttons">
      <button onclick="enterSite()">Enter</button>
      <button onclick="exitSite()">Leave</button>
    </div>
  </div>
</div>

<div class="overlay">

<header>
  <h1>Elite House</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#brands">Brands</a>
    <a href="#deals">Deals</a>
    <a href="#experience">Experience</a>
    <a href="#visit">Location</a>
  </nav>
</header>

<section class="hero"></section>

<section class="section" id="brands">
  <h2>Brands We Carry</h2>
  <div class="brands">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
  </div>
</section>

<section class="section" id="deals">
  <h2>Deals This Week</h2>
  <div class="deals">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
  </div>
</section>

<section class="section" id="experience">
  <h2>The Elite Experience</h2>
  <div class="experience">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
  </div>
</section>

<section class="section" id="visit">
  <h2>Visit Us</h2>
  <div class="visit">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166306/visit-us_ihw6sf.png">
    <iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
  </div>
</section>

<footer>
  © 2026 Elite House Smoke Shop
</footer>

</div>

<script>
function enterSite() {
  localStorage.setItem("ageVerified", "true");
  document.getElementById("ageGate").style.display = "none";
}

function exitSite() {
  window.location.href = "https://www.google.com";
}

if (localStorage.getItem("ageVerified") === "true") {
  document.getElementById("ageGate").style.display = "none";
}
</script>

</body>
</html>
