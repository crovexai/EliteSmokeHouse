<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  text-align:center;
  padding:15px 0;
}

nav{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

nav a{
  color:#00f5d4; /* TEAL FIX */
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero{
  padding:10px;
}
.hero img{
  width:100%;
  border-radius:12px;
}

/* SECTION */
.section{
  margin:30px 15px;
}

/* TITLE */
.section-title{
  font-family:'Permanent Marker', cursive;
  font-size:26px;
  text-align:center;
  color:#b84cff;
  margin-bottom:20px;
}

/* SCROLL ROWS */
.brands,
.deals,
.experience{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.brands::-webkit-scrollbar,
.deals::-webkit-scrollbar,
.experience::-webkit-scrollbar{
  display:none;
}

/* ITEMS */
.brands img,
.deals img,
.experience img{
  border-radius:12px;
}

/* SIZES */
.brands img{ height:80px; } /* bigger logos */
.deals img{ flex:0 0 85%; max-width:320px; }
.experience img{ flex:0 0 80%; max-width:300px; }

/* VISIT */
.visit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* MAP FIX (darker) */
iframe{
  width:100%;
  height:160px;
  border:none;
  border-radius:12px;
  filter:brightness(0.45) contrast(1.2) saturate(0.7);
}

/* IMAGE */
.visit img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
}

/* INTERACTIVE */
.visit-card{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  transition:transform .15s ease;
}

.visit-card:active{
  transform:scale(.95);
}

/* DARK OVERLAY */
.visit-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

/* GLOW */
.visit-card::after{
  content:"";
  position:absolute;
  inset:0;
  box-shadow:0 0 25px rgba(0,255,255,0.2);
  opacity:0;
  transition:.3s;
}

.visit-card:active::after{
  opacity:1;
}

.visit-card iframe{
  pointer-events:none;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* 🔥 NEON SMOKE BACKGROUND (POPUP) */
.popup::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at 20% 40%, rgba(180,0,255,0.6), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,255,200,0.5), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(255,120,0,0.5), transparent 40%);

  filter:blur(90px);
}

/* POPUP BOX */
.popup-box{
  position:relative;
  background:rgba(0,0,0,0.75);
  padding:30px;
  border-radius:12px;
  text-align:center;
  backdrop-filter:blur(6px);
}

.popup-box h2{
  font-family:'Permanent Marker';
  color:#00f5d4;
}

.popup-buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.enter-btn,
.exit-btn{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.enter-btn{
  background:#00f5d4;
  color:#000;
}

.exit-btn{
  background:#333;
  color:#fff;
}

/* 🔥 SITE SMOKE (after entering) */
.smoke{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:5;

  background:
    radial-gradient(circle at 20% 40%, rgba(180,0,255,0.5), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,255,200,0.4), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(255,120,0,0.4), transparent 40%);

  filter:blur(80px);
  opacity:0;
}

/* ANIMATION */
.fade-in{
  animation:smokeIn 1.2s ease forwards;
}

.fade-out{
  animation:smokeOut 2s ease forwards;
}

@keyframes smokeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:.85; transform:scale(1);}
}

@keyframes smokeOut{
  from{opacity:.85;}
  to{opacity:0;}
}

</style>
</head>

<body>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>Elite House</h2>
    <p>Premium Vape Experience</p>
    <p>21+ Only</p>

    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Enter</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<div class="smoke" id="smoke"></div>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<section class="hero">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<section class="section">
<div class="section-title">Brands We Carry</div>
<div class="brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
</div>
</section>

<section class="section">
<div class="visit">

<a href="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan" class="visit-card">
  <iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
</a>

<a href="https://www.google.com/maps/dir/?api=1&destination=Elite+House+Smoke+Shop+San+Juan" class="visit-card">
  <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
</a>

</div>
</section>

<script>
function enter(){
  document.getElementById("popup").style.display="none";

  const smoke = document.getElementById("smoke");
  smoke.classList.add("fade-in");

  setTimeout(()=>{
    smoke.classList.remove("fade-in");
    smoke.classList.add("fade-out");
  },1200);
}

function exitSite(){
  window.location.href="https://google.com";
}
</script>

</body>
</html>
