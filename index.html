<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite House</title>

<!-- BRUSH FONT -->
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#000;
  color:#fff;

  -ms-overflow-style:none;
  scrollbar-width:none;
}
body::-webkit-scrollbar{display:none;}

.container{
  width:92%;
  margin:auto;
}

/* NAV */
header{
  text-align:center;
  padding:20px 0;
}

nav a{
  margin:0 8px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero img{
  width:100%;
  border-radius:12px;
}

/* SECTION */
.section{
  margin:35px 0;
}

/* 🔥 BRUSH NEON TITLE */
.section-title{
  font-family:'Permanent Marker', cursive;
  font-size:26px;
  letter-spacing:1px;

  color:#b84cff;

  text-shadow:
    0 0 6px #b84cff,
    0 0 12px #b84cff,
    0 0 20px rgba(184,76,255,0.6);

  margin-bottom:15px;
}

/* BRANDS */
.brands{
  display:flex;
  gap:25px;
  overflow-x:auto;
}

.brands img{
  height:40px;
  flex:0 0 auto;
}

/* DEALS */
.deals{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.deals img{
  flex:0 0 85%;
  max-width:320px;
  border-radius:12px;
}

/* EXPERIENCE */
.experience{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.experience img{
  flex:0 0 80%;
  max-width:300px;
  border-radius:12px;
}

/* VISIT */
.visit{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.visit img{
  width:100%;
  border-radius:12px;
}

iframe{
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  opacity:0.6;
}

/* AGE POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup button{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  background:#b84cff;
  color:#fff;
  border-radius:6px;
}

/* DESKTOP */
@media(min-width:900px){

  .brands{
    justify-content:space-between;
    overflow:visible;
  }

  .deals{
    display:grid;
    grid-template-columns:repeat(3,1fr);
  }

  .experience{
    display:grid;
    grid-template-columns:repeat(4,1fr);
  }

  .experience img{
    max-width:100%;
  }

  .visit{
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
  }

}
</style>
</head>

<body>

<!-- AGE -->
<div class="popup" id="popup">
  <div>
    <h2>18+ Only</h2>
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="container">

<header>
  <h1>Elite House</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<!-- 🔥 BRANDS -->
<section class="section">
<div class="section-title">Brands We Carry</div>

<div class="brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
</div>
</section>

<!-- DEALS -->
<section class="section">
<div class="deals">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
</div>
</section>

<!-- EXPERIENCE -->
<section class="section">
<div class="experience">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
</div>
</section>

<!-- VISIT -->
<section class="section">
<div class="visit">

<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166306/visit-us_ihw6sf.png">

<iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>

<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">

</div>
</section>

<footer>
© 2026 Elite House Smoke Shop
</footer>

</div>

<script>
function enter(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
