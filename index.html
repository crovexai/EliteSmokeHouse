<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 🔥 SMOKE ENTRY EFFECT */
.smoke{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:5;
  opacity:0;
}
.smoke.active{ opacity:0.25; transition:opacity .3s ease; }
.smoke.settle{ animation:smokeFade 2.5s ease forwards; }

.smoke::before,
.smoke::after{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:url("https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166332/vape-store-background_jwo2nr.png") repeat;
  background-size:contain;
}
.smoke::before{ animation:drift1 3s ease forwards; }
.smoke::after{ animation:drift2 3s ease forwards; opacity:0.4; }

@keyframes drift1{ from{transform:translate(0,0);} to{transform:translate(-10%,-5%);} }
@keyframes drift2{ from{transform:translate(0,0);} to{transform:translate(10%,5%);} }
@keyframes smokeFade{ 0%{opacity:.25;} 100%{opacity:0;} }

/* HEADER */
header{ text-align:center; padding:20px 0; }
nav a{
  margin:0 8px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero img{ width:100%; border-radius:12px; }

/* SECTION */
.section{ margin:35px 0; }

/* 🔥 BRANDS TITLE (brush neon, no glow) */
.section-title{
  font-family:'Permanent Marker', cursive;
  font-size:26px;
  text-align:center;
  color:#b84cff;
  position:relative;
  overflow:hidden;
  margin-bottom:20px;
}
.section-title::after{
  content:"";
  position:absolute;
  top:0; left:-100%;
  width:200%; height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
  animation:smokeText 6s linear infinite;
}
@keyframes smokeText{
  from{transform:translateX(-100%);}
  to{transform:translateX(100%);}
}

/* 🔥 SCROLL ROWS (gesture-locked) */
.brands,
.deals,
.experience{
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;

  touch-action:pan-x;
  overscroll-behavior-x:contain;
  overscroll-behavior-y:contain;

  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
}

.brands img,
.deals img,
.experience img{
  scroll-snap-align:center;
  transition:.25s;
  user-select:none;
  -webkit-user-drag:none;
}

/* CENTER FOCUS */
.active{ transform:scale(1.08); filter:brightness(1.2); }

/* SIZES */
.brands img{ height:60px; padding:0 10px; }
.deals img{
  flex:0 0 85%;
  max-width:320px;
  border-radius:12px;
}
.experience img{
  flex:0 0 80%;
  max-width:300px;
  border-radius:12px;
}

/* VISIT */
.visit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}
@media(max-width:600px){
  .visit{ grid-template-columns:1fr; }
}
iframe{
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}
.visit img{ width:100%; border-radius:12px; }

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  opacity:0.6;
}

/* AGE POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.popup-box{
  width:90%;
  max-width:320px;
  padding:30px;
  text-align:center;
  border-radius:14px;
  background:#111;
}
.popup-title{ font-size:22px; }
.popup-buttons{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.enter-btn{
  flex:1;
  padding:10px;
  background:#b84cff;
  border:none;
  color:#fff;
}
.exit-btn{
  flex:1;
  padding:10px;
  border:1px solid #555;
  background:none;
  color:#fff;
}
</style>
</head>

<body>

<div class="smoke" id="smoke"></div>

<!-- AGE -->
<div class="popup" id="popup">
  <div class="popup-box">
    <div class="popup-title">21+ Only</div>
    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Enter</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<section class="hero">
  <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<section class="section">
  <div class="section-title">Brands We Carry</div>
  <div class="brands">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
  </div>
</section>

<section class="section">
  <div class="deals">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
  </div>
</section>

<section class="section">
  <div class="experience">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
  </div>
</section>

<section class="section">
  <div class="visit">
    <iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
  </div>
</section>

<footer>
  © 2026 Elite House Smoke Shop
</footer>

<script>
// AGE + SMOKE ENTRY
function enter(){
  const popup = document.getElementById("popup");
  const smoke = document.getElementById("smoke");

  popup.style.display = "none";
  smoke.classList.add("active");

  setTimeout(()=> smoke.classList.add("settle"), 400);
  setTimeout(()=> smoke.style.display = "none", 2800);
}
function exitSite(){
  window.location.href = "https://google.com";
}

// CENTER FOCUS (all rows)
function highlight(container){
  const center = container.scrollLeft + container.offsetWidth/2;
  [...container.children].forEach(el=>{
    const c = el.offsetLeft + el.offsetWidth/2;
    if(Math.abs(center - c) < el.offsetWidth/2){
      el.classList.add("active");
    } else {
      el.classList.remove("active");
    }
  });
}
[".brands",".deals",".experience"].forEach(sel=>{
  const el = document.querySelector(sel);
  if(!el) return;
  el.addEventListener("scroll", ()=>highlight(el));
});

// 🔥 AUTO-SCROLL ONLY FOR BRANDS (non-intrusive)
(function initBrandsAuto(){
  const el = document.querySelector(".brands");
  if(!el) return;

  // duplicate for seamless loop
  el.innerHTML += el.innerHTML;

  let pos = 0;
  let interacting = false;
  let last = Date.now();

  function loop(){
    const now = Date.now();
    if(!interacting && now - last > 900){
      pos += 0.2;                 // slower = more premium
      el.scrollLeft = pos;

      // seamless wrap
      if(pos >= el.scrollWidth / 2){
        pos = el.scrollLeft - el.scrollWidth / 2;
      }
    }
    highlight(el);
    requestAnimationFrame(loop);
  }

  // pause on user interaction
  el.addEventListener("scroll", ()=>{
    interacting = true;
    last = Date.now();
    pos = el.scrollLeft;

    clearTimeout(el._t);
    el._t = setTimeout(()=> interacting = false, 120);
  });

  ["touchstart","mousedown"].forEach(e=>{
    el.addEventListener(e, ()=>{
      interacting = true;
      last = Date.now();
    });
  });

  ["touchend","mouseup","mouseleave"].forEach(e=>{
    el.addEventListener(e, ()=>{
      last = Date.now();
      setTimeout(()=> interacting = false, 300);
    });
  });

  document.addEventListener("visibilitychange", ()=>{
    interacting = document.hidden;
  });

  loop();
})();
</script>

</body>
</html>
