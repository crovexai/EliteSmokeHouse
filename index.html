<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  text-align:center;
  padding:15px 0;
}
nav{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}
nav a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero{
  padding:10px;
}
.hero img{
  width:100%;
  border-radius:12px;
}

/* SECTION */
.section{
  margin:30px 15px;
}

/* TITLE */
.section-title{
  font-family:'Permanent Marker', cursive;
  font-size:26px;
  text-align:center;
  color:#b84cff;
  margin-bottom:20px;
}

/* SCROLL ROWS */
.brands,
.deals,
.experience{
  display:flex;
  gap:12px;
  overflow-x:auto;
  scroll-snap-type:x proximity;
  padding-bottom:5px;
}

/* REMOVE SCROLLBAR */
.brands::-webkit-scrollbar,
.deals::-webkit-scrollbar,
.experience::-webkit-scrollbar{
  display:none;
}

/* ITEMS */
.brands img,
.deals img,
.experience img{
  scroll-snap-align:center;
  border-radius:12px;
}

/* SIZES */
.brands img{
  height:70px;
}

.deals img{
  flex:0 0 85%;
  max-width:320px;
}

.experience img{
  flex:0 0 80%;
  max-width:300px;
}

/* VISIT SECTION */
.visit{
  display:grid;
  gap:15px;
  grid-template-columns:1fr;
}

/* DESKTOP */
@media(min-width:768px){
  .visit{
    grid-template-columns:1fr 1fr;
    align-items:center;
  }
}

/* MAP */
iframe{
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}

/* STEP INSIDE IMAGE */
.visit img{
  width:100%;
  border-radius:12px;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  background:#111;
  padding:30px;
  border-radius:12px;
  text-align:center;
}

.popup-box h2{
  color:#b84cff;
  margin-bottom:10px;
}

.popup-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:15px;
}

.enter-btn,
.exit-btn{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

.enter-btn{
  background:#b84cff;
}

.exit-btn{
  background:#333;
}

/* SMOKE FADE EFFECT */
.smoke{
  position:fixed;
  inset:0;
  background:url('https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166332/vape-store-background_jwo2nr.png') center/cover;
  opacity:0;
  pointer-events:none;
  z-index:5;
}
.fade-in{
  animation:smokeIn 1.5s forwards;
}
.fade-out{
  animation:smokeOut 2s forwards;
}

@keyframes smokeIn{
  from{opacity:0;}
  to{opacity:.6;}
}
@keyframes smokeOut{
  from{opacity:.6;}
  to{opacity:0;}
}

</style>
</head>

<body>

<div class="popup" id="popup">
  <div class="popup-box">
    <h2>21+ Only</h2>
    <p>Are you 21 years or older?</p>
    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Enter</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<div class="smoke" id="smoke"></div>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<section class="hero">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<section class="section">
<div class="section-title">Brands We Carry</div>
<div class="brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
</div>
</section>

<section class="section">
<div class="deals">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
</div>
</section>

<section class="section">
<div class="experience">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
</div>
</section>

<section class="section">
<div class="visit">

<iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>

<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">

</div>
</section>

<script>
function enter(){
  document.getElementById("popup").style.display="none";

  const smoke = document.getElementById("smoke");
  smoke.classList.add("fade-in");

  setTimeout(()=>{
    smoke.classList.remove("fade-in");
    smoke.classList.add("fade-out");
  },1200);
}

function exitSite(){
  window.location.href="https://google.com";
}
</script>

</body>
</html>
