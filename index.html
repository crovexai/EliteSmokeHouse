<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
  background:#000;
  overflow-x:hidden;
}

body{
  font-family:Arial, sans-serif;
  color:#fff;
}

/* =========================
   RED WARNING BANNER
========================= */
.warning-banner{
  width:100%;
  background:#d40000;
  color:#fff;
  text-align:center;
  font-weight:700;
  font-size:16px;
  line-height:1.4;
  padding:12px 16px;
  letter-spacing:.2px;
  z-index:3000;
  position:relative;
}

/* =========================
   HEADER
========================= */
header{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(0,0,0,0.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,255,212,0.15);
  padding:12px 16px;
}

nav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
  max-width:900px;
  margin:0 auto;
}

nav a{
  color:#00f5d4;
  text-decoration:none;
  font-size:14px;
  position:relative;
  transition:0.25s ease;
}

nav a:hover{
  color:#00ffe5;
  text-shadow:0 0 10px rgba(0,255,229,0.6);
}

nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0;
  height:2px;
  background:#00f5d4;
  transition:0.3s ease;
}

nav a:hover::after{
  width:100%;
}

/* =========================
   HERO - DESKTOP FULL WIDTH
========================= */
.hero{
  width:100%;
  min-height:620px;
  background-image:url('https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png');
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  display:block;
}

/* Desktop uses background image */
.hero img{
  display:none;
}

/* =========================
   GENERAL SECTIONS
========================= */
.section{
  width:100%;
  max-width:1200px;
  margin:54px auto;
  padding:0 24px;
}

.section-title{
  font-family:'Permanent Marker', cursive;
  font-size:clamp(24px, 3vw, 34px);
  text-align:center;
  color:#b84cff;
  margin-bottom:26px;
  letter-spacing:1px;
}

/* =========================
   DESKTOP LAYOUT
========================= */
.brands,
.deals,
.experience{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:22px;
  overflow:visible;
}

/* BRANDS */
.brands img{
  height:96px;
  width:auto;
  object-fit:contain;
  display:block;
}

/* DEAL CARDS */
.deals img{
  width:320px;
  height:320px;
  object-fit:contain;
  border-radius:14px;
  display:block;
}

/* EXPERIENCE IMAGES */
.experience img{
  width:330px;
  height:235px;
  object-fit:cover;
  border-radius:14px;
  display:block;
}

/* =========================
   VISIT / MAP SECTION
========================= */
.visit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  align-items:stretch;
}

.visit-card{
  display:block;
  position:relative;
  border-radius:14px;
  overflow:hidden;
  transition:transform .2s ease;
  min-height:260px;
  background:#050505;
}

.visit-card:active{
  transform:scale(.97);
}

.visit-card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  background:rgba(0,0,0,0.25);
  pointer-events:none;
  z-index:2;
}

.visit-card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  box-shadow:0 0 24px rgba(0,255,255,0.25);
  opacity:0;
  transition:.3s;
  pointer-events:none;
  z-index:3;
}

.visit-card:hover::after,
.visit-card:active::after{
  opacity:1;
}

iframe{
  width:100%;
  height:260px;
  border:none;
  border-radius:14px;
  filter:brightness(0.6) contrast(1.1) saturate(0.8);
  opacity:0.92;
  display:block;
}

.visit img{
  width:100%;
  height:260px;
  object-fit:contain;
  border-radius:14px;
  display:block;
  background:#000;
}

.visit-card iframe{
  pointer-events:none;
}

/* =========================
   POPUP
========================= */
.popup{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
  padding:20px;
}

.popup-box{
  width:100%;
  max-width:380px;
  background:rgba(0,0,0,0.86);
  padding:34px 26px;
  border-radius:18px;
  text-align:center;
  border:1px solid rgba(184,76,255,0.45);
  box-shadow:
    0 0 25px rgba(184,76,255,0.32),
    inset 0 0 18px rgba(0,245,212,0.08);
}

.popup-box h2{
  font-family:'Permanent Marker', cursive;
  color:#b84cff;
  font-size:34px;
  margin-bottom:10px;
}

.popup-box p{
  font-size:16px;
  line-height:1.4;
  color:#eee;
}

.popup-buttons{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:22px;
}

.enter-btn,
.exit-btn{
  padding:11px 22px;
  border:none;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
  transition:0.25s ease;
}

.enter-btn{
  background:#b84cff;
  box-shadow:0 0 16px rgba(184,76,255,0.45);
}

.exit-btn{
  background:#222;
  border:1px solid rgba(255,255,255,0.16);
}

.enter-btn:hover{
  background:#c96cff;
}

.exit-btn:hover{
  background:#333;
}

/* =========================
   SMOKE OVERLAY
========================= */
.smoke{
  position:fixed;
  inset:0;
  background:url('https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166332/vape-store-background_jwo2nr.png') center/cover no-repeat;
  opacity:0;
  pointer-events:none;
  z-index:1500;
}

.fade-in{
  animation:smokeIn 1.5s forwards;
}

.fade-out{
  animation:smokeOut 2s forwards;
}

@keyframes smokeIn{
  from{opacity:0;}
  to{opacity:.6;}
}

@keyframes smokeOut{
  from{opacity:.6;}
  to{opacity:0;}
}

/* =========================
   LARGE DESKTOP
========================= */
@media (min-width:1400px){
  .hero{
    min-height:680px;
  }
}

/* =========================
   TABLET
========================= */
@media (max-width:1024px){
  .hero{
    min-height:520px;
  }

  .section{
    margin:44px auto;
  }

  .deals img{
    width:280px;
    height:280px;
  }

  .experience img{
    width:290px;
    height:220px;
  }
}

/* =========================
   MOBILE
========================= */
@media (max-width:768px){

  .warning-banner{
    font-size:13px;
    padding:10px 12px;
  }

  header{
    padding:10px 12px;
  }

  nav{
    gap:12px;
  }

  nav a{
    font-size:13px;
  }

  /* Mobile shows full image without crop */
  .hero{
    min-height:auto;
    background-image:none;
    padding:10px;
  }

  .hero img{
    display:block;
    width:100%;
    height:auto;
    max-height:55vh;
    object-fit:contain;
    border-radius:12px;
  }

  .section{
    margin:34px auto;
    padding:0 15px;
  }

  .section-title{
    font-size:26px;
    margin-bottom:20px;
  }

  /* Mobile keeps swipe rows */
  .brands,
  .deals,
  .experience{
    justify-content:flex-start;
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:12px;
    scroll-snap-type:x proximity;
    touch-action:pan-y;
    -webkit-overflow-scrolling:touch;
    padding-bottom:4px;
  }

  .brands::-webkit-scrollbar,
  .deals::-webkit-scrollbar,
  .experience::-webkit-scrollbar{
    display:none;
  }

  .brands img,
  .deals img,
  .experience img{
    scroll-snap-align:center;
    flex-shrink:0;
  }

  .brands img{
    height:76px;
  }

  .deals img{
    width:82%;
    height:auto;
    max-width:320px;
  }

  .experience img{
    width:82%;
    height:auto;
    max-width:320px;
    object-fit:contain;
  }

  .visit{
    grid-template-columns:1fr;
    gap:14px;
  }

  .visit-card{
    min-height:160px;
  }

  iframe,
  .visit img{
    height:170px;
  }

  .popup-box{
    max-width:330px;
    padding:30px 22px;
  }

  .popup-box h2{
    font-size:30px;
  }

  .popup-buttons{
    flex-direction:row;
  }
}

/* =========================
   SMALL PHONES
========================= */
@media (max-width:420px){

  nav{
    gap:10px;
  }

  nav a{
    font-size:12px;
  }

  .hero{
    padding:8px;
  }

  .brands img{
    height:68px;
  }

  .deals img,
  .experience img{
    width:86%;
  }

  iframe,
  .visit img{
    height:160px;
  }
}
</style>
</head>

<body>

<!-- RED WARNING BANNER -->
<div class="warning-banner">
  ADVERTENCIA: Este producto contiene nicotina. La nicotina es adictiva.
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h2>21+ Only</h2>
    <p>Are you 21 years or older?</p>

    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Enter</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<div class="smoke" id="smoke"></div>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#brands">Brands</a>
    <a href="#deals">Deals</a>
    <a href="#experience">Experience</a>
    <a href="#location">Location</a>
  </nav>
</header>

<section class="hero">
  <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png" alt="Elite House Smoke Shop hero">
</section>

<section class="section" id="brands">
  <div class="section-title">Brands We Carry</div>

  <div class="brands">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png" alt="Geek Bar">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png" alt="Raz">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png" alt="Elf Bar">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png" alt="Flum">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png" alt="Nexa">
  </div>
</section>

<section class="section" id="deals">
  <div class="deals">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png" alt="Geek Bar deals">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png" alt="Raz specials">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png" alt="Bundle offers">
  </div>
</section>

<section class="section" id="experience">
  <div class="experience">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777238327/the-elite-experience_nz4xtu.png" alt="The Elite Experience">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png" alt="Elite House outside">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png" alt="Elite House inside">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png" alt="Elite House interior">
  </div>
</section>

<section class="section" id="location">
  <div class="visit">

    <a href="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan" class="visit-card" target="_blank" rel="noopener">
      <iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed" loading="lazy"></iframe>
    </a>

    <a href="https://www.google.com/maps/dir/?api=1&destination=Elite+House+Smoke+Shop+San+Juan" class="visit-card" target="_blank" rel="noopener">
      <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png" alt="Step inside Elite House">
    </a>

  </div>
</section>

<script>
function enter(){
  document.getElementById("popup").style.display = "none";

  const smoke = document.getElementById("smoke");
  smoke.classList.remove("fade-out");
  smoke.classList.add("fade-in");

  setTimeout(() => {
    smoke.classList.remove("fade-in");
    smoke.classList.add("fade-out");
  }, 1200);
}

function exitSite(){
  window.location.href = "https://google.com";
}
</script>

</body>
</html>
