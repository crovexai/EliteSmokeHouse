<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite House</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;

  -ms-overflow-style:none;
  scrollbar-width:none;
}
body::-webkit-scrollbar{display:none;}

.container{
  width:92%;
  margin:auto;
}

/* HEADER */
header{
  text-align:center;
  padding:20px 0;
}

nav a{
  margin:0 8px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero img{
  width:100%;
  border-radius:12px;
}

/* SECTION */
.section{
  margin:35px 0;
}

/* CLEAN TITLE */
.section-title{
  font-size:22px;
  font-weight:600;
  text-align:center;
  margin-bottom:20px;
}

/* SCROLL ROWS */
.brands,
.deals,
.experience{
  display:flex;
  overflow-x:auto;
  gap:0;
  scroll-snap-type:x mandatory;
}

.brands img,
.deals img,
.experience img{
  margin:0;
  scroll-snap-align:start;
}

/* BRANDS BIGGER */
.brands img{
  height:60px;
  flex:0 0 auto;
  padding:0 12px;
}

/* DEALS */
.deals img{
  flex:0 0 85%;
  max-width:320px;
  border-radius:12px;
}

/* EXPERIENCE */
.experience img{
  flex:0 0 80%;
  max-width:300px;
  border-radius:12px;
}

/* VISIT */
.visit{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.visit img{
  width:100%;
  border-radius:12px;
}

iframe{
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  opacity:0.6;
}

/* 🔥 AGE POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  width:90%;
  max-width:320px;
  padding:30px 20px;
  text-align:center;
  border-radius:14px;

  background:linear-gradient(145deg,#0a0a0a,#000);

  box-shadow:
    0 0 15px rgba(184,76,255,0.3),
    0 0 40px rgba(0,255,255,0.1);
}

.popup-title{
  font-size:24px;
  font-weight:700;
  background:linear-gradient(90deg,#00f0ff,#b84cff,#ff7a00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

.popup-sub{
  font-size:14px;
  opacity:0.7;
  margin-bottom:20px;
}

.popup-buttons{
  display:flex;
  gap:10px;
}

.enter-btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#00f0ff,#b84cff);
  color:#fff;
  font-weight:600;
}

.exit-btn{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:transparent;
  color:#fff;
}

/* DESKTOP */
@media(min-width:900px){

  .brands{
    justify-content:space-between;
    overflow:visible;
  }

  .deals{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
  }

  .experience{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
  }

  .experience img{
    max-width:100%;
  }

  .visit{
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
  }

}
</style>
</head>

<body>

<!-- 🔥 AGE GATE -->
<div class="popup" id="popup">
  <div class="popup-box">
    <div class="popup-title">Are You 21+?</div>
    <div class="popup-sub">
      This experience is only for adults.<br>
      Enter if you're ready.
    </div>
    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Yes, Enter</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<div class="container">

<header>
  <h1>Elite House</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<!-- BRANDS -->
<section class="section">
<div class="section-title">Brands We Carry</div>

<div class="brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
</div>
</section>

<!-- DEALS -->
<section class="section">
<div class="deals">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
</div>
</section>

<!-- EXPERIENCE -->
<section class="section">
<div class="experience">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
</div>
</section>

<!-- VISIT -->
<section class="section">
<div class="visit">

<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166306/visit-us_ihw6sf.png">

<iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>

<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">

</div>
</section>

<footer>
© 2026 Elite House Smoke Shop
</footer>

</div>

<script>
function enter(){
  document.getElementById("popup").style.display="none";
}

function exitSite(){
  window.location.href = "https://www.google.com";
}
</script>

</body>
</html>
