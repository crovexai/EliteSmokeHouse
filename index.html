<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.loader{
  max-width:420px;
}

h1{
  color:#00f5d4;
  margin-bottom:12px;
}

p{
  color:#ccc;
  margin-bottom:20px;
}

.links{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

a{
  color:#fff;
  background:#b84cff;
  text-decoration:none;
  padding:12px 18px;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="loader">
  <h1>Elite House</h1>
  <p>Loading the right version for your device...</p>

  <div class="links">
    <a href="desktop/index.html">Desktop Site</a>
    <a href="mobile/index.html">Mobile Site</a>
  </div>
</div>

<script>
if (window.innerWidth <= 768) {
  window.location.replace("mobile/index.html");
} else {
  window.location.replace("desktop/index.html");
}
</script>

</body>
</html>
