<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House Smoke Shop</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
}

.container {
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* NAV */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 0;
}

nav a {
  margin:0 15px;
  color:#fff;
  text-decoration:none;
}

/* HERO FIX (NO CROP) */
.hero img {
  width:100%;
  height:auto;
  border-radius:12px;
}

/* SECTIONS */
.section {
  margin:50px 0;
}

h2 {
  margin-bottom:20px;
}

/* BRANDS */
.brands {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:20px;
  align-items:center;
}

.brands img {
  width:100%;
  max-height:60px;
  object-fit:contain;
}

/* DEALS (SLIDER MOBILE) */
.deals {
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.deals::-webkit-scrollbar {
  display:none;
}

.deals img {
  flex:0 0 80%;
  max-width:320px;
  border-radius:12px;
  scroll-snap-align:center;
}

/* DESKTOP DEAL GRID */
@media(min-width:900px){
  .deals {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    overflow:hidden;
  }

  .deals img {
    max-width:100%;
  }
}

/* EXPERIENCE */
.experience {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.experience img {
  width:100%;
  border-radius:12px;
}

/* VISIT */
.visit {
  display:grid;
  grid-template-columns:1fr 1.5fr 1fr;
  gap:20px;
}

.visit img,
iframe {
  width:100%;
  border-radius:12px;
}

/* MOBILE */
@media(max-width:900px){
  .brands {
    grid-template-columns:repeat(2,1fr);
  }

  .experience,
  .visit {
    grid-template-columns:1fr;
  }

  nav {
    display:flex;
    flex-direction:column;
    align-items:center;
  }
}

/* AGE POPUP */
.popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#00e0ff;
  color:black;
}
</style>
</head>

<body>

<div class="popup" id="popup">
  <div>
    <h2>Are you 18+?</h2>
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="container">

<header>
  <h1>Elite House</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<!-- HERO FIXED -->
<section class="hero">
  <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<section class="section">
  <h2>Brands We Carry</h2>
  <div class="brands">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
  </div>
</section>

<section class="section">
  <h2>Deals This Week</h2>
  <div class="deals">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
  </div>
</section>

<section class="section">
  <h2>The Elite Experience</h2>
  <div class="experience">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
  </div>
</section>

<section class="section">
  <h2>Visit Us</h2>
  <div class="visit">
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166306/visit-us_ihw6sf.png">
    <iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
    <img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
  </div>
</section>

<footer>
  © 2026 Elite House Smoke Shop
</footer>

</div>

<script>
function enter(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
