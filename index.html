<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 🔥 SMOKE */
.smoke{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:0.08;
}
.smoke::before,
.smoke::after{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:url("https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166332/vape-store-background_jwo2nr.png") repeat;
  background-size:contain;
  animation:smokeMove 80s linear infinite;
}
.smoke::after{
  animation-direction:reverse;
  opacity:0.4;
}
@keyframes smokeMove{
  from{transform:translate(0,0);}
  to{transform:translate(-20%, -20%);}
}

/* CONTENT ABOVE SMOKE */
.container, header, section, footer{
  position:relative;
  z-index:2;
}
.container{
  width:92%;
  margin:auto;
}

/* HEADER */
header{
  text-align:center;
  padding:20px 0;
}
nav a{
  margin:0 8px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero img{
  width:100%;
  border-radius:14px;
}

/* SECTION */
.section{
  margin:40px 0;
}

/* TITLE */
.section-title{
  text-align:center;
  margin-bottom:20px;
  font-size:22px;
}

/* SCROLL ROW */
.brands,
.deals,
.experience{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
}

/* ITEMS */
.brands img,
.deals img,
.experience img{
  scroll-snap-align:center;
  transition:.25s;
}

/* HOVER */
.brands img:hover,
.deals img:hover,
.experience img:hover{
  transform:translateY(-5px) scale(1.03);
  filter:brightness(1.1);
}

/* ACTIVE CENTER */
.active{
  transform:scale(1.08) !important;
  filter:brightness(1.2);
}

/* SIZES */
.brands img{
  height:60px;
  padding:0 10px;
}
.deals img{
  flex:0 0 85%;
  max-width:320px;
  border-radius:12px;
}
.experience img{
  flex:0 0 80%;
  max-width:300px;
  border-radius:12px;
}

/* VISIT */
.visit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}
@media(max-width:600px){
  .visit{
    grid-template-columns:1fr;
  }
}
iframe{
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}
.visit img{
  width:100%;
  border-radius:12px;
  transition:.3s;
}
.visit img:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(184,76,255,0.3);
}

/* FADE IN */
.fade{
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.popup-box{
  width:90%;
  max-width:320px;
  padding:30px;
  text-align:center;
  border-radius:14px;
  background:#111;
  box-shadow:0 0 20px rgba(184,76,255,0.4);
}
.popup-title{
  font-size:22px;
}
.popup-buttons{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.enter-btn{
  flex:1;
  padding:10px;
  background:#b84cff;
  border:none;
  color:#fff;
  border-radius:6px;
}
.exit-btn{
  flex:1;
  padding:10px;
  border:1px solid #555;
  background:none;
  color:#fff;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="smoke"></div>

<!-- AGE -->
<div class="popup" id="popup">
  <div class="popup-box">
    <div class="popup-title">Are You 18+?</div>
    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Yes</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<div class="container">

<header>
  <h1>Elite House</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<section class="hero fade">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<section class="section fade">
<div class="section-title">Brands We Carry</div>
<div class="brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
</div>
</section>

<section class="section fade">
<div class="deals">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
</div>
</section>

<section class="section fade">
<div class="experience">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
</div>
</section>

<section class="section fade">
<div class="visit">
<iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
</div>
</section>

<footer>
© 2026 Elite House Smoke Shop
</footer>

</div>

<script>
// AGE
function enter(){
  document.getElementById("popup").style.display="none";
}
function exitSite(){
  window.location.href="https://google.com";
}

// 🔥 AUTO CAROUSEL (SMOOTH + NO GLITCH)
function initCarousel(selector){
  const el = document.querySelector(selector);
  if(!el) return;

  el.innerHTML += el.innerHTML;

  let pos = 0;
  let interacting = false;
  let last = Date.now();

  function loop(){
    if(!interacting && Date.now()-last > 800){
      pos += 0.25;
      el.scrollLeft = pos;

      if(pos >= el.scrollWidth/2){
        pos = el.scrollLeft - el.scrollWidth/2;
      }
    }

    highlight(el);
    requestAnimationFrame(loop);
  }

  el.addEventListener("scroll",()=>{
    interacting = true;
    last = Date.now();
    pos = el.scrollLeft;

    clearTimeout(el.timer);
    el.timer = setTimeout(()=>interacting=false,120);
  });

  ["touchstart","mousedown"].forEach(e=>{
    el.addEventListener(e,()=>{
      interacting = true;
      last = Date.now();
    });
  });

  ["touchend","mouseup","mouseleave"].forEach(e=>{
    el.addEventListener(e,()=>{
      last = Date.now();
      setTimeout(()=>interacting=false,300);
    });
  });

  document.addEventListener("visibilitychange",()=>{
    interacting = document.hidden;
  });

  loop();
}

// ACTIVE CENTER SCALE
function highlight(container){
  const center = container.scrollLeft + container.offsetWidth/2;

  [...container.children].forEach(el=>{
    const c = el.offsetLeft + el.offsetWidth/2;
    if(Math.abs(center-c)<el.offsetWidth/2){
      el.classList.add("active");
    } else {
      el.classList.remove("active");
    }
  });
}

// FADE
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
},{threshold:.2});

document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

// INIT
initCarousel(".brands");
initCarousel(".deals");
initCarousel(".experience");
</script>

</body>
</html>
