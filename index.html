<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite House</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:20px 0;
}
nav a{
  margin:0 8px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero img{
  width:100%;
  border-radius:12px;
}

/* SECTION */
.section{
  margin:35px 0;
}

/* 🔥 BRANDS TITLE */
.section-title{
  font-family:'Permanent Marker';
  font-size:26px;
  text-align:center;
  color:#b84cff;
  margin-bottom:20px;
}

/* SCROLL ROWS */
.brands,
.deals,
.experience{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x proximity;
}

/* ITEMS */
.brands img,
.deals img,
.experience img{
  scroll-snap-align:center;
  transition:.25s;
}

/* ACTIVE */
.active{
  transform:scale(1.08);
  filter:brightness(1.2);
}

/* SIZES */
.brands img{
  height:60px;
  padding:0 10px;
}

.deals img{
  flex:0 0 85%;
  max-width:320px;
  border-radius:12px;
}

.experience img{
  flex:0 0 80%;
  max-width:300px;
  border-radius:12px;
}

/* VISIT */
.visit{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:600px){
  .visit{grid-template-columns:1fr;}
}

iframe{
  width:100%;
  height:250px;
  border:none;
  border-radius:12px;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  padding:30px;
  background:#111;
}

.popup-buttons{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.enter-btn,
.exit-btn{
  padding:10px;
  border:none;
  color:#fff;
}

.enter-btn{background:#b84cff;}
.exit-btn{background:#333;}

</style>
</head>

<body>

<div class="popup" id="popup">
  <div class="popup-box">
    <div>21+ Only</div>
    <div class="popup-buttons">
      <button class="enter-btn" onclick="enter()">Enter</button>
      <button class="exit-btn" onclick="exitSite()">No</button>
    </div>
  </div>
</div>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Brands</a>
    <a href="#">Deals</a>
    <a href="#">Experience</a>
    <a href="#">Location</a>
  </nav>
</header>

<section class="hero">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166401/smoke-shop-hero_agqdzt.png">
</section>

<section class="section">
<div class="section-title">Brands We Carry</div>
<div class="brands" id="brands">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166394/ChatGPT_Image_Apr_25_2026_08_04_39_PM_oasjiq.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_04_53_PM_bbgx5p.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166399/ChatGPT_Image_Apr_25_2026_08_04_30_PM_odwlza.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166357/ChatGPT_Image_Apr_25_2026_08_04_22_PM_rzy4zs.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166383/ChatGPT_Image_Apr_25_2026_08_15_55_PM_sirvsz.png">
</div>
</section>

<section class="section">
<div class="deals">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/geekbar-ad_uuxqsz.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166330/raz-ad_n40a57.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166331/bundle-ad_qxcqcr.png">
</div>
</section>

<section class="section">
<div class="experience">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166324/the-elite-experience_nz4xtu.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166375/outside_wqh4vb.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-1_qwqhxc.png">
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166379/inside-2_hots3k.png">
</div>
</section>

<section class="section">
<div class="visit">
<iframe src="https://www.google.com/maps?q=Elite+House+Smoke+Shop+San+Juan&output=embed"></iframe>
<img src="https://res.cloudinary.com/dovrzmlqj/image/upload/v1777166326/step-inside_u9hdex.png">
</div>
</section>

<script>
function enter(){
  document.getElementById("popup").style.display="none";
}
function exitSite(){
  window.location.href="https://google.com";
}

/* 🔥 SAFE AUTO SCROLL (ONLY BRANDS, NO LOCK) */
const brands = document.getElementById("brands");
let scrollPos = 0;
let paused = false;

function autoScroll(){
  if(!paused){
    scrollPos += 0.3;
    brands.scrollLeft = scrollPos;

    if(scrollPos >= brands.scrollWidth - brands.clientWidth){
      scrollPos = 0;
    }
  }
  requestAnimationFrame(autoScroll);
}

/* pause on interaction */
["touchstart","mousedown"].forEach(e=>{
  brands.addEventListener(e,()=>paused=true);
});

["touchend","mouseup","mouseleave"].forEach(e=>{
  brands.addEventListener(e,()=>{
    setTimeout(()=>paused=false,800);
  });
});

autoScroll();
</script>

</body>
</html>
